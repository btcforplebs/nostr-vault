name = "haven-push"
main = "src/index.js"
compatibility_date = "2024-01-01"

[durable_objects]
bindings = [
  { name = "RELAY_SUBSCRIBER", class_name = "RelaySubscriber" }
]

[[migrations]]
tag = "v1"
new_classes = ["RelaySubscriber"]

[[kv_namespaces]]
binding = "REGISTRATIONS"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"   # `wrangler kv:namespace create REGISTRATIONS`

# Secrets (set via `wrangler secret put`):
#   APNS_KEY_ID      — 10-char key ID from Apple Developer portal (.p8 filename prefix)
#   APNS_TEAM_ID     — 10-char Team ID from Apple Developer account
#   APNS_BUNDLE_ID   — e.g. "com.yourname.haven"
#   APNS_PRIVATE_KEY — full contents of the .p8 file including -----BEGIN/END----- lines
