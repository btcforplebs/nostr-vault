name: HavenApp
options:
  xcodeVersion: "16.0"
  deploymentTarget:
    macOS: "14.0"
    iOS: "16.0"
  generateEmptyDirectories: false
  groupSortPosition: none

settings:
  base:
    DEVELOPMENT_TEAM: KAD7WNBGH2
    SWIFT_VERSION: "5.0"
    CODE_SIGN_STYLE: Automatic

targets:

  # ── macOS Target ──────────────────────────────────────────
  HavenApp:
    type: application
    platform: macOS
    deploymentTarget: "14.0"

    sources:
      # macOS-only entry point + app delegate
      - path: HavenApp/App/HavenApp.swift
      - path: HavenApp/App/AppDelegate.swift
      # Shared code
      - path: HavenApp/Models
      - path: HavenApp/Services
        excludes:
          - "haven.dylib"
      - path: HavenApp/Views

    resources:
      - path: Resources/Assets.xcassets
      - path: Resources/haven
      - path: Resources/templates
      - path: HavenApp/App/PrivacyInfo.xcprivacy

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bitvora.HavenApp
        PRODUCT_NAME: HAVEN
        SWIFT_OBJC_BRIDGING_HEADER: HavenApp/HavenApp-Bridging-Header.h
        LIBRARY_SEARCH_PATHS: ["$(inherited)", "$(PROJECT_DIR)/build"]
        INFOPLIST_FILE: HavenApp/App/Info.plist
        GENERATE_INFOPLIST_FILE: false
        ENABLE_HARDENED_RUNTIME: true
        CODE_SIGN_ENTITLEMENTS: HavenApp/App/HavenApp.entitlements
        CURRENT_PROJECT_VERSION: "101"
        MARKETING_VERSION: "2.3.0"

    preBuildScripts:
      - name: Build Go Library (macOS)
        script: |
          "${PROJECT_DIR}/HavenApp/App/build_haven.sh"
        outputFiles:
          - $(PROJECT_DIR)/build/libhaven.a

    dependencies:
      - sdk: build/libhaven.a
        embed: false
        implicit: true

  # ── iOS Target ────────────────────────────────────────────
  HavenApp-iOS:
    type: application
    platform: iOS
    deploymentTarget: "16.0"

    sources:
      # iOS-only entry point + delegates + views
      - path: HavenApp-iOS
        excludes:
          - "*.h"
          - "Info.plist"
      # Shared code
      - path: HavenApp/Models
      - path: HavenApp/Services
        excludes:
          - "haven.dylib"
      - path: HavenApp/Views

    resources:
      - path: Resources/Assets.xcassets
      - path: Resources/haven
      - path: Resources/templates
      - path: HavenApp/App/PrivacyInfo.xcprivacy

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bitvora.HavenApp.iOS
        PRODUCT_NAME: "$(TARGET_NAME)"
        SWIFT_OBJC_BRIDGING_HEADER: HavenApp-iOS/HavenApp-Bridging-Header.h
        LIBRARY_SEARCH_PATHS: ["$(inherited)", "$(PROJECT_DIR)/build/ios"]
        INFOPLIST_FILE: HavenApp-iOS/Info.plist
        GENERATE_INFOPLIST_FILE: false
        TARGETED_DEVICE_FAMILY: "1,2"
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "1.0"

    preBuildScripts:
      - name: Build Go Library (iOS)
        script: |
          "${PROJECT_DIR}/HavenApp/App/build_haven_ios.sh"
        outputFiles:
          - $(PROJECT_DIR)/build/ios/libhaven.a

    dependencies:
      - sdk: build/ios/libhaven.a
        embed: false
        implicit: true
